<div class="card purple-card">
  <h2>CUSTOMER DETAILS</h2>

  <label>Customer Name</label>
  <input type="text" [(ngModel)]="name" placeholder="Enter customer name" />

  <label>Mobile Number</label>
  <input type="text" [(ngModel)]="mobile" placeholder="Enter mobile number" />

  <button class="save-btn" (click)="saveCustomer()">
    Save Customer
  </button>
</div>
