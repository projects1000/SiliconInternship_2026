<div class="billing-card">
  <div class="card-header">
    <h3>3. BILL DETAILS <span class="badge">Child</span></h3>
  </div>
  <div class="card-body">
    <div *ngIf="selectedProducts.length === 0" class="empty-state">
      <div class="empty-icon">🛒</div>
      <p>No products selected. Add some Nitro drinks above!</p>
    </div>

    <div *ngIf="selectedProducts.length > 0" class="bill-content">
      <div class="table-responsive">
        <table class="bill-table">
          <thead>
            <tr>
              <th>Product</th>
              <th class="text-center">Qty</th>
              <th class="text-right">Price</th>
              <th class="text-right">Total</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of selectedProducts">
              <td>{{ item.name }}</td>
              <td class="text-center font-semibold">{{ item.qty }}</td>
              <td class="text-right">₹{{ item.price }}</td>
              <td class="text-right">₹{{ item.total }}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="summary-section">
        <div class="summary-row">
          <span>Sub Total</span>
          <span>₹{{ totals.subTotal.toFixed(2) }}</span>
        </div>
        <div class="summary-row">
          <span>GST (18%)</span>
          <span>₹{{ totals.gst.toFixed(2) }}</span>
        </div>
        <div class="summary-row grand-total-row">
          <span>Grand Total</span>
          <span class="total-amount">₹{{ totals.grandTotal.toFixed(2) }}</span>
        </div>
      </div>

      <button class="generate-btn" (click)="generateBill()">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"></polyline>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
          <rect x="6" y="14" width="12" height="8"></rect>
        </svg>
        <span>Generate & Print Bill</span>
      </button>
    </div>
  </div>
</div>
