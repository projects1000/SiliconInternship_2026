<div class="user-chat-card">
  <!-- Profile Header -->
  <div class="user-header">
    <div class="avatar-container">
      <div class="user-avatar mayur-avatar">M</div>
      <span class="status-dot online"></span>
    </div>
    <div class="user-meta">
      <h4>Mayur Sahu</h4>
      <span class="user-role">Logged in as: <strong>Mayur</strong></span>
    </div>
  </div>

  <!-- Typing/Input Box -->
  <div class="typing-box">
    <div class="input-container">
      <button class="attach-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
        </svg>
      </button>
      <input 
        type="text" 
        [(ngModel)]="messageText" 
        (keydown.enter)="sendMessage()" 
        placeholder="Type a message as Mayur..." 
        class="chat-input"
      />
      <button class="mic-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
      </button>
    </div>
    <button class="send-btn" [disabled]="!messageText.trim()" (click)="sendMessage()">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
      <span>Send</span>
    </button>
  </div>
</div>
