<div class="chat-container-inner">
  <!-- Chat Header -->
  <div class="chat-header">
    <div class="header-user-info">
      <div class="active-avatar-stack">
        <span class="avatar-circle gents-c">G</span>
        <span class="avatar-circle mayur-c">M</span>
      </div>
      <div class="chat-title-group">
        <h3>Design Chat</h3>
        <span class="chat-members-count">2 members, 2 online</span>
      </div>
    </div>
    <div class="header-controls">
      <button class="control-btn" title="Search messages">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
      <button class="control-btn" title="Voice call">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
        </svg>
      </button>
      <button class="control-btn" title="More options">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="1"></circle>
          <circle cx="12" cy="5" r="1"></circle>
          <circle cx="12" cy="19" r="1"></circle>
        </svg>
      </button>
    </div>
  </div>

  <!-- Messages Timeline Feed -->
  <div class="chat-feed" #scrollContainer>
    <div *ngIf="messages.length === 0" class="empty-feed">
      <div class="bubble-icon">💬</div>
      <p>Your timeline is clear. Start chatting as Zen or Mayur!</p>
    </div>

    <div *ngFor="let msg of messages" class="message-row" [ngClass]="msg.sender.toLowerCase()">
      <!-- Zen message avatar -->
      <div class="row-avatar gents-a" *ngIf="msg.sender === 'Zen'">Z</div>
      
      <!-- Message Bubble -->
      <div class="message-bubble">
        <div class="bubble-sender-name">{{ msg.sender }}</div>
        <div class="bubble-text">{{ msg.text }}</div>
        
        <div class="bubble-meta">
          <span class="timestamp">{{ msg.timestamp | date:'shortTime' }}</span>
          <span class="read-receipt" *ngIf="msg.sender === 'Mayur'">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </span>
        </div>
      </div>

      <!-- Mayur message avatar -->
      <div class="row-avatar mayur-a" *ngIf="msg.sender === 'Mayur'">M</div>
    </div>
  </div>

  <!-- Shared Bottom Stats Panel -->
  <div class="chat-footer-stats">
    <div class="stat-badge-chip font-medium">
      <span>Total Messages:</span>
      <strong class="count-val">{{ messageCount }}</strong>
    </div>
    <div class="stat-badge-chip last-message-chip">
      <span>Last Msg:</span>
      <span class="last-val" [title]="lastMessage">{{ lastMessage }}</span>
    </div>
  </div>
</div>
