<div class="attendance-page">
    <header class="attendance-header">
        <button mat-icon-button type="button" routerLink="/grp-e/member3" aria-label="Back to profile">
            <mat-icon>arrow_back</mat-icon>
        </button>

        <div>
            <p>Silicon Internship 2026</p>
            <h1>Team Attendance Register</h1>
        </div>
    </header>

    <main class="register-layout">
        <aside class="team-panel">
            <h2>Teams</h2>

            <div class="team-list">
                <button
                    type="button"
                    *ngFor="let team of teams"
                    [class.active-team]="team.name === selectedTeamName"
                    (click)="selectTeam(team.name)">
                    <span>{{ team.name }}</span>
                    <small>{{ team.members.length }} members</small>
                </button>
            </div>
        </aside>

        <section class="register-panel">
            <div class="register-toolbar">
                <div>
                    <h2>{{ selectedTeam.name }} Members</h2>
                    <p>{{ presentCount() }} of {{ selectedTeam.members.length }} present</p>
                </div>

                <div class="toolbar-actions">
                    <label for="attendanceDate">Date</label>
                    <input
                        id="attendanceDate"
                        type="date"
                        [value]="selectedDateKey"
                        [max]="currentDateKey"
                        (change)="selectDate($event)">

                    <button
                        mat-stroked-button
                        type="button"
                        (click)="lockAttendance()"
                        [disabled]="selectedDateKey !== currentDateKey || isSelectedDateLocked()">
                        <mat-icon>lock</mat-icon>
                        {{ isSelectedDateLocked() ? 'Locked' : 'Lock' }}
                    </button>
                </div>
            </div>

            <div class="date-note">
                Attendance for {{ selectedDateLabel() }}
            </div>

            <table class="members-table">
                <thead>
                    <tr>
                        <th>Mark</th>
                        <th>Intern Name</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let member of selectedTeam.members">
                        <td>
                            <mat-checkbox
                                color="primary"
                                [checked]="isPresent(member)"
                                [disabled]="!canEdit(member)"
                                (change)="markAttendance(member, $event.checked)"
                                [attr.aria-label]="'Mark attendance for ' + member.name">
                            </mat-checkbox>
                        </td>
                        <td>{{ member.name }}</td>
                        <td>
                            <span class="status present" *ngIf="isPresent(member)">
                                <mat-icon>check_circle</mat-icon>
                                Present
                            </span>
                            <span class="status absent" *ngIf="!isPresent(member)">Absent</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
