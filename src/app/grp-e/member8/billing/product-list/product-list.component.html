<section class="panel">

  <div class="product-header">

    <h2>Product List</h2>

    <div class="header-actions">
      <button
  class="cart-btn"
  (click)="openCart.emit()">
  🛒 Cart ({{ totals.totalItems }})
</button>

      <button
  class="exit-btn"
  (click)="exitToHome.emit()">
  Exit
</button>
    </div>
  </div>

 <div class="search-box">

  <input
    type="text"
    placeholder="Search product..."
    [(ngModel)]="searchText">

  <button class="search-btn" (click)="searchProduct()">
    Search
  </button>

</div>

  <span *ngIf="!customerSaved">
    Save customer first
  </span>

  <table>

    <thead>
      <tr>
        <th>Product Name</th>
        <th>Price</th>
        <th>Quantity</th>
      </tr>
    </thead>

<tbody>

  <tr *ngFor="let product of searchedProducts">

    <td>{{ product.name }}</td>

    <td>₹{{ product.price }}</td>

    <td>
      <div class="quantity-box">

        <button
          type="button"
          [disabled]="getQuantity(product.id) === 0"
          (click)="decreaseQuantity(product)">
          -
        </button>

        <span class="qty">
          {{ getQuantity(product.id) }}
        </span>

        <button
          type="button"
          [disabled]="!customerSaved"
          (click)="increaseQuantity(product)">
          +
        </button>

        <button
          type="button"
          [disabled]="!customerSaved"
          (click)="addProduct(product)">
          Add
        </button>

      </div>
    </td>

  </tr>

  <tr *ngIf="noProductFound">
  <td colspan="3" class="not-found">

    <p>Product not found</p>

    <button
      class="back-btn"
      (click)="backToProducts()">
      ← Back
    </button>

  </td>
</tr>

</tbody>
  </table>

</section>
