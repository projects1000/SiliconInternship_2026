<div class="chat-header">

  <div>

    <strong>User A</strong>

    <span class="online">
      ● {{userAStatus}}
    </span>

  </div>

  <div>

    <button
      class="clear-btn"
      (click)="clearChat()">

      Clear Chat

    </button>

  </div>

  <div>

    <strong>User B</strong>

    <span class="online">
      ● {{userBStatus}}
    </span>

  </div>

</div>

<div
  class="typing-indicator"
  *ngIf="chatService.typingUser">

  ✍️ {{chatService.typingUser}} is typing...

</div>

<div class="chat-container">

  <div
    *ngFor="
      let msg of chatService.messages;
      let i = index
    "
    class="message"
    [ngClass]="{
      'user-a': msg.sender === 'User A',
      'user-b': msg.sender === 'User B'
    }">

    <button
      class="delete-btn"
      (click)="deleteMessage(i)">

      🗑️

    </button>

    <div class="sender">
      {{msg.sender}}
    </div>

    <div class="text">
      {{msg.text}}
    </div>

    <div class="time">
      {{msg.time | date:'shortTime'}}
    </div>

  </div>

</div>
