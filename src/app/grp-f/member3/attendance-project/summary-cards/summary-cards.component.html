<div class="cards-container">

  <div class="card">
    <h2>{{totalStudents}}</h2>
    <p>Total Students</p>
  </div>

  <div class="card">
    <h2>{{presentCount}}</h2>
    <p>Present Today</p>
  </div>

  <div class="card">
    <h2>{{absentCount}}</h2>
    <p>Absent Today</p>
  </div>

  <div class="card">
    <h2>{{attendancePercentage}}%</h2>
    <p>Attendance Rate</p>
  </div>

</div>
