<div class="card">

  <h2>
    Customer Details
  </h2>

  <input
    type="text"
    placeholder="Customer Name"
    [(ngModel)]="customer.name">

  <input
    type="text"
    placeholder="Mobile Number"
    [(ngModel)]="customer.mobile">

  <button
    (click)="saveCustomer()">

    Save Customer

  </button>

</div>
