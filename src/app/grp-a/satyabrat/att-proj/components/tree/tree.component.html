<div class="tree-container">
  <mat-tree [dataSource]="dataSource" [treeControl]="treeControl" class="team-tree">
    
    <!-- Member Node -->
    <mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding class="member-node">
      <button mat-icon-button disabled style="width: 24px; height: 24px;"></button>
      <mat-icon class="member-icon">person</mat-icon>
      {{node.name}}
    </mat-tree-node>

    <!-- Group Node -->
    <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild">
      
      <div class="team-node" matTreeNodeToggle>
        <button mat-icon-button [attr.aria-label]="'Toggle ' + node.name">
          <mat-icon class="mat-icon-rtl-mirror">
            {{treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right'}}
          </mat-icon>
        </button>
        <mat-icon class="team-icon">groups</mat-icon>
        {{node.name}}
      </div>
      
      <div [class.team-tree-invisible]="!treeControl.isExpanded(node)" role="group">
        <ng-container matTreeNodeOutlet></ng-container>
      </div>
    </mat-nested-tree-node>

  </mat-tree>
</div>
