<div class="card shadow-sm h-100">
    <div class="card-header bg-light text-primary fw-bold text-center">1. PRODUCT LIST (Child)</div>
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Price (₹)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let prod of products">
                    <td>{{ prod.name }}</td>
                    <td>{{ prod.price }}</td>
                    <td>
                        <button class="btn btn-success btn-sm" (click)="onAdd(prod)">Add</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
