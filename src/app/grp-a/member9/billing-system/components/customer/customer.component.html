<div class="card shadow-sm h-100">
    <div class="card-header bg-light fw-bold text-center" style="color: purple;">2. CUSTOMER DETAILS (Child)</div>
    <div class="card-body">
        <div class="mb-3">
            <label class="form-label text-muted">Customer Name</label>
            <input type="text" class="form-control" [(ngModel)]="customerName" placeholder="Enter Name">
        </div>
        <div class="mb-3">
            <label class="form-label text-muted">Mobile Number</label>
            <input type="text" class="form-control" [(ngModel)]="mobileNumber" placeholder="Enter Mobile">
        </div>
        <button class="btn w-100 text-white" style="background-color: #6f42c1;" (click)="onSave()">Save
            Customer</button>
    </div>
</div>
