<div class="chat-hub-container">
  <div class="side-panel">
    <div class="user-avatar">👨‍💻</div>
    <h3>Arjun</h3>
    <textarea [(ngModel)]="msgArjun" placeholder="Type as Arjun..."></textarea>
    <button (click)="send('Arjun')">SEND</button>
  </div>

  <div class="message-grid">
    <div *ngFor="let m of messages" [class]="'msg-bubble ' + m.sender">
      <small>{{m.sender}} • {{m.time}}</small>
      <p>{{m.text}}</p>
    </div>
  </div>

  <div class="side-panel">
    <div class="user-avatar">👩‍🔬</div>
    <h3>Priya</h3>
    <textarea [(ngModel)]="msgPriya" placeholder="Type as Priya..."></textarea>
    <button (click)="send('Priya')">SEND</button>
  </div>
</div>
