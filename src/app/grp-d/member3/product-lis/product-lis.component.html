<div class="inventory-card">
  <h3>Available Gadgets</h3>
  <table border="1">
    <thead>
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Stock</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of products">
        <td>{{ p.name }}</td>
        <td>{{ p.category }}</td>
        <td>${{ p.price }}</td>
        <td>{{ p.stock }}</td>
      </tr>
    </tbody>
  </table>
</div>
