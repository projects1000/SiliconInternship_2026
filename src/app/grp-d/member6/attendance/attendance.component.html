<mat-sidenav-container class="attendance-container">
  <mat-sidenav mode="side" opened class="sidenav">
    <mat-tree [dataSource]="dataSource" [treeControl]="treeControl">
      <mat-tree-node *matTreeNodeDef="let node" (click)="selectGroup(node)" matTreeNodePadding>
        {{node.name}}
      </mat-tree-node>
    </mat-tree>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <div class="header-actions">
      <mat-form-field appearance="outline">
        <mat-label>Select Date</mat-label>
        <input matInput [matDatepicker]="picker" [(ngModel)]="selectedDate">
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>

      <button mat-raised-button color="primary" (click)="lockAttendance()" [disabled]="isLocked">
        <mat-icon>lock</mat-icon> Lock Date
      </button>
      <button mat-raised-button (click)="exportToExcel()">
        <mat-icon>description</mat-icon> Export to Excel
      </button>
    </div>

    <table mat-table [dataSource]="activeMembers" class="mat-elevation-z8">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Intern Name </th>
        <td mat-cell *matCellDef="let m"> {{m.name}} </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let m">
          <button mat-button 
                  [color]="getStatus(m.id) === 'Present' ? 'primary' : 'warn'" 
                  (click)="toggleStatus(m)" 
                  [disabled]="isLocked">
            {{ getStatus(m.id) }}
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['name', 'status']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['name', 'status']"></tr>
    </table>
  </mat-sidenav-content>
</mat-sidenav-container>
