<div class="card">

  <h2>Product Management Table</h2>

  <input
    type="text"
    placeholder="Search products..."
    [(ngModel)]="searchText"
  />

  <button class="reset-btn" (click)="resetAll()">Reset Cart</button>

  <button class="bill-btn" (click)="generateBill()">
    Generate Bill
  </button>

  <table class="product-table">

    <thead>
      <tr>
        <th>Product Name</th>
        <th>Price (₹)</th>
        <th>Quantity</th>
        <th>Total (₹)</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let p of filteredProducts">

        <td>{{ p.name }}</td>
        <td>{{ p.price }}</td>
        <td>{{ p.qty }}</td>
        <td>{{ p.price * p.qty }}</td>

        <td>
          <button (click)="addProduct(p)">+</button>
          <button class="remove" (click)="removeProduct(p)">-</button>
        </td>

      </tr>
    </tbody>

  </table>

</div>
