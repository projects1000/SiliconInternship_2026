<!-- ============================================================
  notification-panel.component.html
  Activity Feed — subscribed to NotificationService (BehaviorSubject)
  Shared Service Communication — no @Input needed
  ============================================================ -->

<div class="notif-panel">
  <div class="panel-header">
    <div class="header-left">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span>Activity Log</span>
    </div>
    <div class="notif-count" *ngIf="notifications.length > 0">{{ notifications.length }}</div>
  </div>

  <!-- Clear Button -->
  <button class="clear-btn" *ngIf="notifications.length > 0" (click)="onClearAll()" id="clear-notifications-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14H6L5 6"/>
      <path d="M10 11v6M14 11v6"/>
      <path d="M9 6V4h6v2"/>
    </svg>
    Clear All
  </button>

  <!-- Empty State -->
  <div class="empty-notif" *ngIf="notifications.length === 0">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="1.5">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <p>No activity yet</p>
    <span>Actions will appear here in real-time</span>
  </div>

  <!-- Notification List -->
  <div class="notif-list" *ngIf="notifications.length > 0">
    <div
      class="notif-item"
      *ngFor="let note of notifications; let i = index"
      [class.first]="i === 0">
      <div class="notif-dot"></div>
      <span class="notif-text">{{ note }}</span>
    </div>
  </div>
</div>
