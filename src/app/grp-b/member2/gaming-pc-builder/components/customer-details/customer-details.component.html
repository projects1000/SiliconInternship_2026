<!-- ============================================================
  customer-details.component.html
  Customer Info Form
  Child → Parent via @Output customerSaved.emit(customer)
  ============================================================ -->

<div class="customer-panel">
  <div class="panel-header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Customer Details</span>
  </div>

  <div class="saved-badge" *ngIf="isSaved">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M20 6 9 17l-5-5"/>
    </svg>
    Customer Saved
  </div>

  <div class="form-group">
    <label for="customer-name">Customer Name</label>
    <input
      id="customer-name"
      type="text"
      [(ngModel)]="customer.name"
      (ngModelChange)="isSaved = false"
      placeholder="Enter full name"
      class="form-input"
    />
  </div>

  <div class="form-group">
    <label for="customer-mobile">Mobile Number</label>
    <input
      id="customer-mobile"
      type="tel"
      [(ngModel)]="customer.mobile"
      (ngModelChange)="isSaved = false"
      placeholder="10-digit mobile number"
      maxlength="10"
      class="form-input"
    />
  </div>

  <div class="form-group">
    <label for="customer-address">Delivery Address</label>
    <textarea
      id="customer-address"
      [(ngModel)]="customer.address"
      (ngModelChange)="isSaved = false"
      placeholder="Enter full delivery address..."
      rows="3"
      class="form-input form-textarea"
    ></textarea>
  </div>

  <div class="form-error" *ngIf="formError">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 8v4M12 16h.01"/>
    </svg>
    {{ formError }}
  </div>

  <div class="form-actions">
    <button id="save-customer-btn" class="save-btn" (click)="onSaveCustomer()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17,21 17,13 7,13 7,21"/>
        <polyline points="7,3 7,8 15,8"/>
      </svg>
      Save Customer
    </button>
    <button class="reset-btn" (click)="onReset()" *ngIf="isSaved">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
      Reset
    </button>
  </div>
</div>
