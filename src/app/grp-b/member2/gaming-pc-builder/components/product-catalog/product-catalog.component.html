<!-- ============================================================
  product-catalog.component.html
  Displays gaming product cards with search + Add To Build
  Child → Parent via @Output productSelected.emit(product)
  ============================================================ -->

<div class="catalog-wrapper">
  <!-- Search Bar -->
  <div class="search-bar">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/>
      <path d="m21 21-4.35-4.35"/>
    </svg>
    <input
      id="product-search"
      type="text"
      [(ngModel)]="searchTerm"
      (ngModelChange)="onSearch()"
      placeholder="Search components, brands..."
      class="search-input"
    />
    <span class="result-count">{{ filteredProducts.length }} items</span>
  </div>

  <!-- Product Grid -->
  <div class="product-grid" *ngIf="filteredProducts.length > 0; else noResults">
    <div
      class="product-card"
      *ngFor="let product of filteredProducts"
      [class.selected]="isSelected(product)"
      [attr.id]="'product-card-' + product.id">

      <!-- Category Badge -->
      <div class="category-badge">{{ product.category }}</div>

      <!-- Product Image -->
      <div class="card-image-wrapper">
        <img
          [src]="product.image"
          [alt]="product.name"
          class="product-img"
          loading="lazy"
        />
        <div class="img-overlay" *ngIf="isSelected(product)">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
          <span>In Build</span>
        </div>
      </div>

      <!-- Product Info -->
      <div class="card-info">
        <div class="brand-tag">{{ product.brand }}</div>
        <h3 class="product-name">{{ product.name }}</h3>
        <p class="product-specs" *ngIf="product.specs">{{ product.specs }}</p>
        <div class="price-row">
          <span class="product-price">{{ formatPrice(product.price) }}</span>
        </div>
      </div>

      <!-- Action Button -->
      <div class="card-actions">
        <button
          *ngIf="!isSelected(product)"
          class="add-btn"
          (click)="onAddProduct(product)"
          [attr.id]="'add-btn-' + product.id">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Add To Build
        </button>
        <button
          *ngIf="isSelected(product)"
          class="remove-btn"
          (click)="onRemoveProduct(product)"
          [attr.id]="'remove-btn-' + product.id">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14"/>
          </svg>
          Remove
        </button>
      </div>
    </div>
  </div>

  <ng-template #noResults>
    <div class="no-results">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <p>No components found</p>
      <span>Try a different filter or search term</span>
    </div>
  </ng-template>
</div>
