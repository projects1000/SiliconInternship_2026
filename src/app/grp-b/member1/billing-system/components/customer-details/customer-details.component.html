<div class="child-box customer-box">
    <div class="card-header">
        <span class="step-badge">02</span>
        <h3>CUSTOMER DETAILS <small>(Child Component)</small></h3>
    </div>

    <div class="form-body">
        <div class="form-group">
            <label for="custName">Customer Name</label>
            <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input id="custName" type="text" [(ngModel)]="customerName" placeholder="Enter Full Name">
            </div>
        </div>

        <div class="form-group">
            <label for="mobNum">Mobile Number</label>
            <div class="input-wrapper">
                <span class="input-icon">📞</span>
                <input id="mobNum" type="text" [(ngModel)]="mobileNumber" placeholder="Enter 10-Digit Mobile"
                    maxlength="10">
            </div>
        </div>

        <button class="btn-save" (click)="saveCustomer()">
            <span>Save Customer Info</span>
            <span class="btn-arrow">→</span>
        </button>
    </div>
</div>
