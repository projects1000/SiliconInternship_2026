<style>
  .child-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  .child-table th, .child-table td { padding: 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
  .child-table th { background-color: #f8fafc; color: #475569; }
  .empty-text { text-align: center; color: #94a3b8; padding: 20px; font-style: italic; }
  .summary-box { margin-top: 15px; padding-top: 10px; border-top: 2px dashed #cbd5e1; }
  .summary-row { display: flex; justify-content: space-between; padding: 5px 0; color: #475569; font-size: 0.95rem; }
  .grand-total { font-weight: bold; color: #dc2626; font-size: 1.1rem; border-top: 1px solid #e2e8f0; margin-top: 5px; padding-top: 10px; }
</style>

<table class="child-table">
  <thead>
    <tr>
      <th>Product</th>
      <th>Qty</th>
      <th>Price</th>
      <th>Total</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let item of selectedProducts">
      <td>{{ item.name }}</td>
      <td>{{ item.qty }}</td>
      <td>₹{{ item.price }}</td>
      <td>₹{{ item.qty * item.price }}</td>
    </tr>
    <tr *ngIf="selectedProducts.length === 0">
      <td colspan="4" class="empty-text">No products selected yet.</td>
    </tr>
  </tbody>
</table>

<div class="summary-box" *ngIf="selectedProducts.length > 0">
  <div class="summary-row"><span>Sub Total</span><span>₹{{ subTotal }}</span></div>
  <div class="summary-row"><span>GST (18%)</span><span>₹{{ gst }}</span></div>
  <div class="summary-row grand-total"><span>Grand Total</span><span>₹{{ grandTotal }}</span></div>
</div>
