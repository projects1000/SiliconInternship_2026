<style>
  .child-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  .child-table th, .child-table td { padding: 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
  .child-table th { background-color: #f8fafc; color: #475569; }
  .btn-add { background-color: #22c55e; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
  .btn-add:hover { background-color: #16a34a; }
</style>

<table class="child-table">
  <thead>
    <tr>
      <th>Product Name</th>
      <th>Price (₹)</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let p of products">
      <td>{{ p.name }}</td>
      <td>₹{{ p.price }}</td>
      <td><button class="btn-add" (click)="onAdd(p)">Add</button></td>
    </tr>
  </tbody>
</table>
