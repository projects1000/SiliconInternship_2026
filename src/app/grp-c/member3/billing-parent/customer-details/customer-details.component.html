<style>
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; font-size: 0.85rem; color: #475569; margin-bottom: 5px; font-weight: bold; }
  .form-input { width: 90%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; outline: none; }
  .form-input:focus { border-color: #7c3aed; }
  .btn-save { background-color: #7c3aed; color: white; border: none; padding: 10px; border-radius: 6px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: bold; }
  .btn-save:hover { background-color: #6d28d9; }
</style>

<div class="form-group">
  <label>Customer Name</label>
  <input type="text" [(ngModel)]="localCustomer.name" placeholder="Rahul Kumar" class="form-input">
</div>
<div class="form-group">
  <label>Mobile Number</label>
  <input type="text" [(ngModel)]="localCustomer.phone" placeholder="9876543210" class="form-input">
</div>
<button class="btn-save" (click)="onSave()">Save Customer</button>
