<div class="user-card">

    <h2 class="user-title">👨 Gents</h2>

    <p class="user-status">🟢 Online</p>

    <input
        class="chat-input"
        type="text"
        [(ngModel)]="message"
        placeholder="Type your message..." />

    <button
        class="send-btn"
        (click)="send()">
        🚀 Send Message
    </button>

</div>
