<div class="sandwich-page">

  <div class="sandwich-card" *ngFor="let item of items">

    <img [src]="item.image" alt="img"[alt]="item.name">

    <div class="sandwich-info">
      <h3>{{ item.name }}</h3>
      <p>${{ item.price.toFixed(2) }}</p>
    </div>

    <div class="sandwich-actions">
      <button (click)="addToCart(item)">−</button>
<span (click)="addToCart(item)">ADD</span>
<button (click)="addToCart(item)">+</button>
    </div>

  </div>

</div>
